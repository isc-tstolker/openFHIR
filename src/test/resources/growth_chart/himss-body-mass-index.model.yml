grammar: FHIRConnect/v0.0.1
type: model
metadata:
  name: "OBSERVATION.body_mass_index.v2"
  version: 0.0.1a # version of this particular mapping
spec: # schema specific to the FHIRConnect v0.0.1 engine
  system: FHIR
  version: R4
  openEhrConfig:
    archetype: "openEHR-EHR-OBSERVATION.body_mass_index.v2"
  fhirConfig:
    structureDefinition: http://hl7.org/fhir/StructureDefinition/bmi

preprocessor:
  fhirConditions:
    - targetRoot: "$resource"
      targetAttribute: "category.coding"
      operator: "one of"
      criteria: "[http://terminology.hl7.org/CodeSystem/observation-category|vital-signs]"

    - targetRoot: "$resource"
      targetAttribute: "status"
      operator: "one of"
      criteria: "[final]"

mappings:
  - name: "subject.reference"
    with:
      fhir: "$resource.subject.reference"
      value: "$patient"

  - name: "performer"
    with:
      fhir: "$resource.performer"
      openehr: "$composition/composer"

  - name: "time"
    with:
      fhir: "$resource.effective"
      openehr: "$archetype/data[at0001]/events[at0002]/time"

  - name: "bmi"
    with:
      fhir: "$resource.value"
      openehr: "$archetype/data[at0001]/events[at0002]/data[at0003]/items[at0004]"
    fhirCondition:
      targetRoot: "$resource"
      targetAttribute: "code.coding"
      operator: "one of"
      criteria: "[$loinc.39156-5]"
      