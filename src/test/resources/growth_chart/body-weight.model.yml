    fhirCondition:
      targetRoot: "$resource.component"
      targetAttribute: "valueCodeableConcept"
      operator: "one of"
      criteria: "[$loinc.LA11873-9]"
    followedBy:
      mappings:
        - name: "hardcodedcodeForClothingwornDuringMeasure"
          with:
            fhir: "code.coding"
            openehr: "$openehrRoot"
          manual:
            - name: "coding"
              fhir:
