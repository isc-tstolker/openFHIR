            openehr: "$openehrRoot"
          followedBy:
            mappings:
              - name: "hardcodedCode"
                with:
                  fhir: "coding"
                  openehr: "$openehrRoot"
                manual:
                  - name: "coding"
                    fhir:
                      - path: "system"
                        value: "http://loinc.org"
                      - path: "code"
                        value: "LA11871-3"
                      - path: "display"
