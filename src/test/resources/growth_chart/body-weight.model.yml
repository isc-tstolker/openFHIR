grammar: FHIRConnect/v0.0.1
type: model
metadata:
  name: "OBSERVATION.body_weight.v2"
  version: 0.0.1a # version of this particular mapping
spec: # schema specific to the FHIRConnect v0.0.1 engine
  system: FHIR
  version: R4
  openEhrConfig:
    archetype: "openEHR-EHR-OBSERVATION.body_weight.v2"
  fhirConfig:
    structureDefinition: http://hl7.org/fhir/StructureDefinition/bodyweight

preprocessor:
  fhirConditions:
    - targetRoot: "$resource"
      targetAttribute: "category.coding"
      operator: "one of"
      criteria: "[http://terminology.hl7.org/CodeSystem/observation-category|vital-signs]"

    - targetRoot: "$resource"
      targetAttribute: "status"
      operator: "one of"
      criteria: "[final]"

mappings:
  - name: "subject.reference"
    with:
      fhir: "$resource.subject.reference"
      value: "$patient"

  - name: "performer"
    with:
      fhir: "$resource.performer"
      openehr: "$composition/composer"

  - name: "time"
    with:
      fhir: "$resource.effective"
      openehr: "$archetype/data[at0002]/events[at0003]/time"
      
  - name: "weight"
    with:
      fhir: "$resource.value"
      openehr: "$archetype/data[at0002]/events[at0003]/data[at0001]/items[at0004]"
      
    fhirCondition:
      targetRoot: "$resource"
      targetAttribute: "code.coding.code"
      operator: "one of"
      criteria: "[$loinc.29463-7, $snomed.27113001]"
      
  - name: "comment"
    with:
      fhir: "$resource.note.text"
      openehr: "$archetype/data[at0002]/events[at0003]/data[at0001]/items[at0024]"
      
  - name: "stateOfDress"
    with:
      fhir: "$resource.component"
      openehr: "$archetype/data[at0002]/events[at0003]/state[at0008]/items[at0009]/value/defining_code/code_string"
    openehrCondition:
      targetRoot: "$archetype"
      targetAttribute: "data[at0002]/events[at0003]/state[at0008]/items[at0009]/value/defining_code/code_string"
      operator: "one of"
      criteria: "[at0010, at0011, at0013]"
    fhirCondition:
      targetRoot: "$resource"
      targetAttribute: "component.code.coding"
      operator: "one of"
      criteria: "[$loinc.8352-7]"
    followedBy:
      mappings:
        - name: "value"
          with:
            fhir: "valueCodeableConcept"
            openehr: "$openehrRoot"
          terminology:
            type: "local"
            conceptmap: "http://open-fhir.com/StateOfDress"
