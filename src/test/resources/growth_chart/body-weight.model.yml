      openehr: "$archetype/data[at0002]/events[at0003]/state[at0008]/items[at0009]/value/value"
    openehrCondition:
      targetRoot: "$archetype"
      targetAttribute: "data[at0002]/events[at0003]/state[at0008]/items[at0009]/value/defining_code/code_string"
      operator: "one of"
      criteria: "[at0011, at0013]"
    fhirCondition:
      targetRoot: "$resource.component"
      targetAttribute: "valueCodeableConcept"
      operator: "one of"
      criteria: "[$loinc.LA11871-3]"
    followedBy:
      mappings:
        - name: "hardcodedcodeForClothingwornDuringMeasure"
