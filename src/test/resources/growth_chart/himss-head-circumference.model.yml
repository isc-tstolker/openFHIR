grammar: FHIRConnect/v0.0.1
type: model
metadata:
  name: "OBSERVATION.head_circumference.v1"
  version: 0.0.1a # version of this particular mapping
spec: # schema specific to the FHIRConnect v0.0.1 engine
  system: FHIR
  version: R4
  openEhrConfig:
    archetype: "openEHR-EHR-OBSERVATION.head_circumference.v1"
  fhirConfig:
    structureDefinition: http://hl7.org/fhir/StructureDefinition/headcircum

preprocessor:
  fhirConditions:
    - targetRoot: "$resource"
      targetAttribute: "category.coding"
      operator: "one of"
      criteria: "[http://terminology.hl7.org/CodeSystem/observation-category|vital-signs]"

    - targetRoot: "$resource"
      targetAttribute: "status"
      operator: "one of"
      criteria: "[final]"

mappings:
  - name: "headCircumference"
    with:
      fhir: "$resource.value"
      openehr: "$archetype/data[at0001]/events[at0010]/data[at0003]/items[at0004]"
      
    fhirCondition:
      targetRoot: "$resource"
      targetAttribute: "code.coding"
      operator: "one of"
      criteria: "[$loinc.9843-4]"

  - name: "time"
    with:
      fhir: "$resource.effective"
      openehr: "$archetype/data[at0001]/events[at0010]/time"
      