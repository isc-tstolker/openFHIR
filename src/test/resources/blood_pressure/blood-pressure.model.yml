grammar: FHIRConnect/v0.0.1
type: model
metadata:
  name: OBSERVATION.blood_pressure.v2
  version: 0.0.1a
spec:
  system: FHIR
  version: R4
  openEhrConfig:
    archetype: openEHR-EHR-OBSERVATION.blood_pressure.v2
  fhirConfig:
    structureDefinition: http://hl7.org/fhir/StructureDefinition/bp

preprocessor:
  fhirConditions:
    - targetRoot: "$resource"
      targetAttribute: "category.coding"
      operator: "one of"
      criteria: "[http://terminology.hl7.org/CodeSystem/observation-category|vital-signs]"

    - targetRoot: "$resource"
      targetAttribute: "code.coding"
      operator: "one of"
      criteria: "[$loinc.85354-9]"
      identifying: true

    - targetRoot: "$resource"
      targetAttribute: "status"
      operator: "one of"
      criteria: "[final]"

mappings:
  - name: "systolic"
    with:
      fhir: "$resource.component"
      openehr: "$archetype/data[at0001]/events[at0006]/data[at0003]/items[at0004]"
    fhirCondition:
      targetRoot: "$resource.component"
      targetAttribute: "code.coding"
      operator: "one of"
      criteria: "[$loinc.8480-6, $snomed.271649006]"
    followedBy:
      mappings:
        - name: "value"
          with:
            fhir: "valueQuantity"
            openehr: "$openehrRoot"

  - name: "diastolic"
    with:
      fhir: "$resource.component"
      openehr: "$archetype/data[at0001]/events[at0006]/data[at0003]/items[at0005]"
    fhirCondition:
      targetRoot: "$resource.component"
      targetAttribute: "code.coding"
      operator: "one of"
      criteria: "[$loinc.8462-4]"
    followedBy:
      mappings:
        - name: "value"
          with:
            fhir: "valueQuantity"
            openehr: "$openehrRoot"

  - name: "clinicalInterpretation"
    with:
      fhir: "$resource.interpretation.text"
      openehr: "$archetype/data[at0001]/events[at0006]/data[at0003]/items[at1059]"

  - name: "description"
    with:
      fhir: "$resource.note.text"
      openehr: "$archetype/data[at0001]/events[at0006]/data[at0003]/items[at0033]"

  - name: "position"
    with:
      openehr: "$archetype/data[at0001]/events[at1042]/state[at0007]/items[at0008]"
    manual:
      - name: "position"
        openehr:
          - path: "terminology_id"
            value: "openehr"
          - path: "value"
            value: "at1000"
          - path: "defining_code"
            value: "at1000"

  - name: "confoundingFactors"
    with:
      openehr: "$archetype/data[at0001]/events[at1042]/state[at0007]/items[at1052]"
      value: "confounding factor"

  - name: "performerHardcodedInFhir"
    with:
      fhir: "$resource.performer.as(Reference).display"
      value: "John Doe"

  - name: "location"
    with:
      fhir: "$resource.bodySite"
      openehr: "$archetype/protocol[at0011]/items[at0014]"
    fhirCondition:
      targetRoot: "$resource.bodySite"
      targetAttribute: "text"
      operator: "one of"
      criteria: "Right arm"
