grammar: FHIRConnect/v1.0.0
type: model
metadata:
  name: OBSERVATION.blood_pressure-NL
  version: 0.0.1-alpha
spec:
  system: FHIR
  version: R4
  openEhrConfig:
    archetype: openEHR-EHR-OBSERVATION.blood_pressure.v2
  fhirConfig:
    # structureDefinition: http://nictiz.nl/fhir/StructureDefinition/nl-core-BloodPressure
    # Temporary use standard bp profile until we have loaded the Dutch profiles
    structureDefinition: http://hl7.org/fhir/StructureDefinition/bp
    multiple: false

preprocessor:
  fhirConditions:
    - targetRoot: "$resource"
      targetAttribute: "status"
      operator: "one of"
      criteria: "[final]"

    - targetRoot: "$resource"
      targetAttribute: "category.coding"
      operator: "one of"
      criteria: "[http://terminology.hl7.org/CodeSystem/observation-category|vital-signs]"

    - targetRoot: "$resource"
      targetAttribute: "code.coding"
      operator: "one of"
      criteria: "[$loinc.85354-9]"
      identifying: true

mappings:
  - name: "subject.reference"
    with:
      fhir: "$resource.subject.reference"
      value: "$patient"

  - name: "performer"
    with:
      fhir: "$resource.performer"
      openehr: "$composition/composer"

  - name: "time"
    with:
      fhir: "$resource.effective"
      openehr: "$archetype/data[at0001]/events[at0006]/time"

  - name: "systolic"
    with:
      fhir: "$resource.component"
      openehr: "$archetype/data[at0001]/events[at0006]/data[at0003]/items[at0004]"
    fhirCondition:
      targetRoot: "$resource.component"
      targetAttribute: "code.coding"
      operator: "one of"
      criteria: "[$loinc.8480-6, $snomed.271649006]"
    followedBy:
      mappings:
        - name: "value"
          with:
            fhir: "valueQuantity"
            openehr: "$openehrRoot"

  - name: "diastolic"
    with:
      fhir: "$resource.component"
      openehr: "$archetype/data[at0001]/events[at0006]/data[at0003]/items[at0005]"
    fhirCondition:
      targetRoot: "$resource.component"
      targetAttribute: "code.coding"
      operator: "one of"
      criteria: "[$loinc.8462-4]"
    followedBy:
      mappings:
        - name: "value"
          with:
            fhir: "valueQuantity"
            openehr: "$openehrRoot"

  - name: averageBloodPressure
    with:
      fhir: "$resource.component"
      openehr: "$archetype/data[at0001]/events[at0006]/data[at0003]/items[at1006]""
    fhirCondition:
      targetRoot: "$resource.component"
      targetAttribute: "code.coding"
      operator: "one of"
      criteria: "[$snomed.6797001]"
    followedBy:
      mappings:
        - name: averageBloodPressure
          with:
            fhir: "valueQuantity"
            openehr: "$openehrRoot"

  - name: cuffType
    with:
      fhir: "$resource.component"
      openehr: "$archetype/protocol[at0011]/items[at0013]"
    fhirCondition:
      targetRoot: "$resource.component"
      targetAttribute: "code.coding"
      operator: one of
      criteria: "[$snomed.70665002]"
    followedBy:
      mappings:
        - name: cufftype
          with:
            fhir: "valueCodeableConcept"
            openehr: "$openehrRoot"

  - name: diastolicEndpoint
    with:
      fhir: "$resource.component"
      openehr: "$archetype/protocol[at0011]/items[at1010]"
    fhirCondition:
      targetRoot: "$resource.component"
      targetAttribute: "code.coding"
      operator: one of
      criteria: "[$snomed.85549003]"
    followedBy:
      mappings:
        - name: diastolicEndpoint
          with:
            fhir: "valueCodeableConcept"
            openehr: "$openehrRoot"

  - name: method
    with:
      fhir: "$resource.method"
      openehr: "$archetype/protocol[at0011]/items[at1035]"

  - name: bodySite
    with:
      fhir: "$resource.bodySite"
      openehr: "$archetype/protocol[at0011]/items[at0014]"

  - name: position # TBD: Add a concept map for the supported codes
    with:
      fhir: "$resource.extension"
      openehr: "$archetype/data[at0001]/events[at0006]/state[at0007]/items[at0008]"
    fhirCondition:
      targetRoot: "$resource.extension"
      targetAttribute: "url"
      operator: one of
      criteria: "http://hl7.org/fhir/StructureDefinition/observation-bodyPosition"
    followedBy:
      mappings:
        - name: bodyPosition
          with:
            fhir: "valueCodeableConcept"
            openehr: "$openehrRoot"
